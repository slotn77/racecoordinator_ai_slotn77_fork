name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd client && npm ci
      - name: Run client tests
        # CI environment has Chrome already, so we can ignore any local Mac path hacks in karma.conf
        run: cd client && npm run test --watch=false

  test-visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd client && npm ci
      - name: Install Playwright Browsers
        run: cd client && npx playwright install --with-deps
      - name: Run visual tests
        # We run npx playwright test directly to use the browsers installed globally in the previous step
        run: cd client && npx playwright test

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build and test with Maven
        # Set skipProtobuf=false because Linux runner can compile protos successfully, unlike Mac which required the script
        run: cd server && mvn test -DskipProtobuf=false
