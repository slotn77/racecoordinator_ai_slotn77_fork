syntax = "proto3";
package com.antigravity;

import "server/race_state.proto";

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "LapProto";

message Lap {
  enum LapType {
    LAP = 0;
    REACTION_TIME = 1;
    FALSE_START = 2;
    MIN_LAP_TIME = 3;
  }

  string objectId = 1;
  double lap_time = 2;
  int32 lap_number = 3;
  double average_lap_time = 4;
  double median_lap_time = 5;
  double best_lap_time = 6;
  int32 interfaceId = 7;
  string driver_id = 8;
  double fuel_level = 9;
  bool is_drift = 10;
  double adjusted_lap_count = 11;
  LapType type = 12;
  RaceFlag flag = 13;
}
