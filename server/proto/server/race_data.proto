syntax = "proto3";
package com.antigravity;

import "server/race_time.proto";
import "server/lap.proto";
import "server/race.proto";

import "server/standings_update.proto";
import "server/overall_standings_update.proto";
import "server/race_state.proto";

import "server/car_data.proto";
import "server/segment.proto";
import "server/record_data.proto";

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "RaceDataProto";

message RaceData {
  RaceTime race_time = 1;
  Lap lap = 2;
  Race race = 3;
  StandingsUpdate standings_update = 5;
  OverallStandingsUpdate overall_standings_update = 6;
  optional RaceState race_state = 7;
  CarData car_data = 8;
  Segment segment = 9;
  optional RaceFlag flag = 10;
  RecordData record_data = 11;
}
