syntax = "proto3";
package com.antigravity;

import "server/race_state.proto";

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "CarDataProto";

message CarData {
  int32 lane = 1;
  double controller_throttle_pct = 2;
  double car_throttle_pct = 3;
  int32 location = 4;
  int32 location_id = 5;
  optional double fuel_level = 6;
  bool is_refueling = 7;
  optional RaceFlag flag = 8;
}
