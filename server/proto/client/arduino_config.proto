syntax = "proto3";
package com.antigravity;

option java_package = "com.antigravity.proto";
option java_multiple_files = true;
option java_outer_classname = "ArduinoConfigProto";

enum PinBehavior {
  BEHAVIOR_UNUSED = 0;
  BEHAVIOR_RESERVED = 1;
  BEHAVIOR_CALL_BUTTON = 2;
  BEHAVIOR_RELAY = 3;
  BEHAVIOR_LED_RGB_STRING = 4;
  BEHAVIOR_LAP_BASE = 1000;
  BEHAVIOR_SEGMENT_BASE = 2000;
  BEHAVIOR_CALL_BUTTON_BASE = 3000;
  BEHAVIOR_RELAY_BASE = 4000;
  BEHAVIOR_PIT_IN_BASE = 5000;
  BEHAVIOR_PIT_OUT_BASE = 6000;
  BEHAVIOR_VOLTAGE_LEVEL_BASE = 7000;
  BEHAVIOR_PIT_IN_OUT_BASE = 8000;
}

enum LapPinPitBehavior {
  LAP_PIN_PIT_NONE = 0;
  LAP_PIN_PIT_IN = 1;
  LAP_PIN_PIT_OUT = 2;
  LAP_PIN_PIT_IN_OUT = 3;
}

enum LedType {
  LED_TYPE_NEOPIXEL = 0;
  LED_TYPE_WS2811 = 1;
  LED_TYPE_WS2812 = 2;
  LED_TYPE_WS2812B = 3;
  LED_TYPE_OTHER = 12;
}

enum ColorOrder {
  COLOR_ORDER_RGB = 0;
  COLOR_ORDER_GRB = 1;
  COLOR_ORDER_BGR = 2;
  COLOR_ORDER_RBG = 3;
  COLOR_ORDER_GBR = 4;
  COLOR_ORDER_BRG = 5;
}

enum PinId {
  option allow_alias = true;
  PIN_ID_UNKNOWN = 0;
  PIN_ID_DIGITAL_BASE = 0;
  PIN_ID_ANALOG_BASE = 1000;
}

enum RgbLedBehavior {
  RGB_LED_BEHAVIOR_UNUSED = 0;
  RGB_LED_BEHAVIOR_HEAT_LEADER = 1;
  RGB_LED_BEHAVIOR_HEAT_PROGRESS = 2;
  RGB_LED_BEHAVIOR_RACE_STATE_BASE = 1000;
  RGB_LED_BEHAVIOR_HEAT_LEADER_BASE = 2000;
  RGB_LED_BEHAVIOR_COUNTDOWN_BASE = 3000;
  RGB_LED_BEHAVIOR_FUEL_LEVEL_BASE = 4000;
  RGB_LED_BEHAVIOR_REFUELING_BASE = 5000;
  RGB_LED_BEHAVIOR_LAP_INDICATOR_BASE = 6000;
  RGB_LED_BEHAVIOR_LAP_SENSOR_BASE = 7000;
}

message ArduinoConfig {
  string name = 1;
  string comm_port = 2;
  int32 baud_rate = 3;
  int32 debounce_us = 4;
  bool normally_closed_lane_sensors = 5;
  bool normally_closed_relays = 6;
  int32 global_invert_lights = 7;
  bool use_pits_as_laps = 10;
  bool use_laps_for_segments = 11;
  int32 hardware_type = 12;
  repeated int32 digital_ids = 13;
  repeated int32 analog_ids = 14;
  reserved 15;
  LapPinPitBehavior lap_pin_pit_behavior = 16;
  repeated VoltageConfig voltage_configs = 17;
  repeated LedString led_strings = 18;
}

message LedString {
  reserved 1;
  repeated int32 leds = 2;
  int32 num_used_leds = 3;
  int32 addressable_leds = 4;
  int32 brightness = 5;
  double flag_flash_rate = 6;
  repeated string led_lane_color_overrides = 7;
  int32 pin = 8;
  LedType led_type = 9;
  ColorOrder color_order = 10;
}

message VoltageConfig {
  int32 lane = 1;
  int32 max_voltage = 2;
}
