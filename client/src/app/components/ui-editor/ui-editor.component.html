<div
  class="page-container ue-container"
  [style.transform]="'translate(-50%, -50%) scale(' + scale + ')'"
>
  <app-editor-title
    titleKey="UE_TITLE"
    backRoute="/raceday-setup"
    [undoManager]="undoManager"
  >
  </app-editor-title>

  <div class="content-area sections-wrapper" *ngIf="!isLoading">
    <!-- Full-Width Column Layout Section -->
    <div class="config-section">
      <div class="section-header" (click)="toggleSection('layout')">
        <span class="expander-icon" [class.collapsed]="!sectionsExpanded.layout"
          >▼</span
        >
        <h1>{{ "UE_LABEL_COLUMNS" | translate }}</h1>
      </div>
      <div class="section-content" *ngIf="sectionsExpanded.layout">
        <div class="panel layout-panel">
          <div class="panel-content column-layout-section">
            <app-column-preview
              [columnSlots]="columnSlots"
              [columnLayouts]="editingSettings.columnLayouts"
              [resizingColumnKey]="resizingColumnKey"
              [columnVisibility]="editingSettings.columnVisibility"
            >
            </app-column-preview>

            <div class="layout-controls">
              <div class="sorting-selector">
                <label class="checkbox-container">
                  <input
                    type="checkbox"
                    [(ngModel)]="editingSettings.sortByStandings"
                    (change)="captureState()"
                  />
                  <span class="checkmark"></span>
                  {{ "UE_LABEL_SORT_STANDINGS" | translate }}
                </label>
              </div>

              <div class="sorting-selector">
                <label class="checkbox-container">
                  <input
                    type="checkbox"
                    [(ngModel)]="editingSettings.highlightRowOnLap"
                    (change)="captureState()"
                  />
                  <span class="checkmark"></span>
                  {{ "UE_LABEL_HIGHLIGHT_LAP" | translate }}
                </label>
              </div>

              <div class="column-actions">
                <button class="btn btn-secondary" (click)="openReorderDialog()">
                  <span class="material-icons"></span>
                  {{ "UE_BTN_REORDER_COLUMNS" | translate }}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings Grid Section -->
    <div class="config-row">
      <!-- Custom UI Settings -->
      <div class="config-section">
        <div class="section-header" (click)="toggleSection('config')">
          <span
            class="expander-icon"
            [class.collapsed]="!sectionsExpanded.config"
            >▼</span
          >
          <h1>{{ "UE_HEADER_CUSTOM_UI" | translate }}</h1>
        </div>
        <div class="section-content" *ngIf="sectionsExpanded.config">
          <div class="panel config-panel">
            <div class="panel-content">
              <div class="directory-selector">
                <label>{{ "UE_DIRECTORY_LABEL" | translate }}</label>
                <div class="directory-info">
                  <span class="directory-path" *ngIf="customDirectoryName">{{
                    customDirectoryName
                  }}</span>
                  <span
                    class="directory-path placeholder"
                    *ngIf="!customDirectoryName"
                    >{{ "UE_LABEL_NO_DIRECTORY" | translate }}</span
                  >
                </div>
                <div class="directory-actions">
                  <button class="btn btn-secondary" (click)="selectDirectory()">
                    {{ "UE_BTN_SELECT_DIRECTORY" | translate }}
                  </button>
                  <button
                    class="btn btn-danger"
                    (click)="resetDefault()"
                    [disabled]="!customDirectoryName"
                  >
                    {{ "UE_BTN_RESET_DEFAULT" | translate }}
                  </button>
                </div>
              </div>

              <div class="transition-selector">
                <label>{{ "UE_LABEL_PAGE_TRANSITION" | translate }}</label>
                <div class="select-container">
                  <select
                    [(ngModel)]="editingSettings.pageTransition"
                    (change)="captureState()"
                  >
                    <option
                      *ngFor="let trans of availableTransitions"
                      [value]="trans.key"
                    >
                      {{ trans.label | translate }}
                    </option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Flag Image Settings -->
      <div class="config-section">
        <div class="section-header" (click)="toggleSection('flags')">
          <span
            class="expander-icon"
            [class.collapsed]="!sectionsExpanded.flags"
            >▼</span
          >
          <h1>{{ "UE_HEADER_FLAGS" | translate }}</h1>
        </div>
        <div class="section-content" *ngIf="sectionsExpanded.flags">
          <div class="panel flags-panel">
            <div class="panel-content flags-grid">
              <app-image-selector
                [label]="'UE_LABEL_GREEN_FLAG' | translate"
                [(imageUrl)]="editingSettings.flagGreen"
                (imageUrlChange)="captureState()"
                [assets]="assets"
              >
              </app-image-selector>
              <app-image-selector
                [label]="'UE_LABEL_YELLOW_FLAG' | translate"
                [(imageUrl)]="editingSettings.flagYellow"
                (imageUrlChange)="captureState()"
                [assets]="assets"
              >
              </app-image-selector>
              <app-image-selector
                [label]="'UE_LABEL_RED_FLAG' | translate"
                [(imageUrl)]="editingSettings.flagRed"
                (imageUrlChange)="captureState()"
                [assets]="assets"
              >
              </app-image-selector>
              <app-image-selector
                [label]="'UE_LABEL_WHITE_FLAG' | translate"
                [(imageUrl)]="editingSettings.flagWhite"
                (imageUrlChange)="captureState()"
                [assets]="assets"
              >
              </app-image-selector>
              <app-image-selector
                [label]="'UE_LABEL_BLACK_FLAG' | translate"
                [(imageUrl)]="editingSettings.flagBlack"
                (imageUrlChange)="captureState()"
                [assets]="assets"
              >
              </app-image-selector>
              <app-image-selector
                [label]="'UE_LABEL_CHECKERED_FLAG' | translate"
                [(imageUrl)]="editingSettings.flagCheckered"
                (imageUrlChange)="captureState()"
                [assets]="assets"
              >
              </app-image-selector>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loader-overlay" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>

  <!-- Reorder Modal -->
  <app-reorder-dialog
    [visible]="showReorderModal"
    [data]="reorderModalData"
    (save)="onReorderSave($event)"
    (cancel)="onReorderCancel()"
  >
  </app-reorder-dialog>
</div>
